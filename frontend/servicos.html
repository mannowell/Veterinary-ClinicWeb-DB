<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Vet - Serviços</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <a href="index.html" class="logo">VetAdmin</a>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-link">Dashboard</a></li>
            <li><a href="agendamentos.html" class="nav-link">Agendamentos</a></li>
            <li><a href="pets.html" class="nav-link">Pets</a></li>
            <li><a href="clientes.html" class="nav-link">Clientes</a></li>
            <li style="margin-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;"></li>
            <li><a href="medicos.html" class="nav-link">Médicos</a></li>
            <li><a href="servicos.html" class="nav-link active">Serviços</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="header-actions">
            <h1>Gestão de Serviços</h1>
            <button class="btn-primary" id="btn-novo-servico">+ Novo Serviço</button>
        </div>

        <div class="glass-panel">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Preço Base</th>
                            <th>Duração (min)</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="servicos-table-body">
                        <tr><td colspan="5" class="loading">Carregando serviços...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Serviço -->
    <div class="modal-overlay" id="servico-modal">
        <div class="modal-content">
            <button class="modal-close" id="close-servico-modal">&times;</button>
            <div class="modal-header">
                <h2 class="modal-title">Configurar Serviço</h2>
            </div>
            <form id="servico-form">
                <input type="hidden" id="serv-id">
                <div class="form-group">
                    <label>Nome do Serviço</label>
                    <input type="text" id="serv-nome" class="form-input" required>
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="serv-desc" class="form-input" style="height: 60px;"></textarea>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Valor Base (R$)</label>
                        <input type="number" step="0.01" id="serv-valor" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label>Duração Estimada (min)</label>
                        <input type="number" id="serv-duracao" class="form-input" required>
                    </div>
                </div>
                <div class="form-group" id="serv-group-ativo" style="display: none;">
                    <label>Status</label>
                    <select id="serv-ativo" class="form-input">
                        <option value="true">Ativo</option>
                        <option value="false">Inativo</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Salvar Configurações</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tableBody = document.getElementById('servicos-table-body');
            const modal = document.getElementById('servico-modal');
            const form = document.getElementById('servico-form');

            const loadServicos = async () => {
                const res = await fetch('http://localhost:3000/api/servicos');
                const data = await res.json();
                tableBody.innerHTML = data.map(s => `
                    <tr>
                        <td><strong>${s.nome}</strong></td>
                        <td style="color: var(--accent-light);">R$ ${parseFloat(s.valor_base).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                        <td>${s.duracao_min} min</td>
                        <td><span class="status-badge status-${s.ativo ? 'agendado' : 'cancelado'}">${s.ativo ? 'Ativo' : 'Inativo'}</span></td>
                        <td><button class="action-icon" onclick="editServico(${s.id})">✎</button></td>
                    </tr>
                `).join('');
            };

            document.getElementById('btn-novo-servico').onclick = () => {
                form.reset();
                document.getElementById('serv-id').value = '';
                document.getElementById('serv-group-ativo').style.display = 'none';
                modal.classList.add('active');
            };

            document.getElementById('close-servico-modal').onclick = () => modal.classList.remove('active');

            form.onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('serv-id').value;
                const payload = {
                    nome: document.getElementById('serv-nome').value,
                    descricao: document.getElementById('serv-desc').value,
                    valor_base: parseFloat(document.getElementById('serv-valor').value),
                    duracao_min: parseInt(document.getElementById('serv-duracao').value),
                    ativo: document.getElementById('serv-ativo').value === 'true'
                };
                await fetch(id ? `http://localhost:3000/api/servicos/${id}` : 'http://localhost:3000/api/servicos', {
                    method: id ? 'PUT' : 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                modal.classList.remove('active');
                loadServicos();
            };

            window.editServico = async (id) => {
                const res = await fetch('http://localhost:3000/api/servicos');
                const data = await res.json();
                const s = data.find(x => x.id == id);
                document.getElementById('serv-id').value = s.id;
                document.getElementById('serv-nome').value = s.nome;
                document.getElementById('serv-desc').value = s.descricao;
                document.getElementById('serv-valor').value = s.valor_base;
                document.getElementById('serv-duracao').value = s.duracao_min;
                document.getElementById('serv-ativo').value = s.ativo.toString();
                document.getElementById('serv-group-ativo').style.display = 'block';
                modal.classList.add('active');
            };

            loadServicos();
        });
    </script>
</body>
</html>
